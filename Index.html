<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tokyo Disneyland Concierge Planner</title>
<style>
:root{
  --bg1:#dbeafe;
  --bg2:#fce7f3;
  --bg3:#fff7ed;
  --card:rgba(255,255,255,.93);
  --text:#172554;
  --muted:#64748b;
  --blue:#2563eb;
  --indigo:#4f46e5;
  --pink:#db2777;
  --green:#059669;
  --amber:#d97706;
  --red:#dc2626;
  --purple:#7c3aed;
  --radius:24px;
  --shadow:0 18px 42px rgba(37,99,235,.10);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(96,165,250,.28), transparent 30%),
    radial-gradient(circle at top right, rgba(244,114,182,.22), transparent 28%),
    linear-gradient(180deg,var(--bg1) 0%, #ffffff 48%, var(--bg2) 78%, var(--bg3) 100%);
}
.wrap{max-width:1280px;margin:auto;padding:18px}
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
  border:1px solid rgba(255,255,255,.75);
  backdrop-filter:blur(10px);
}
.hero{
  background:linear-gradient(135deg,#2563eb 0%, #7c3aed 48%, #db2777 100%);
  color:#fff;
  border-radius:30px;
  padding:24px;
  position:relative;
  overflow:hidden;
}
.hero:before,.hero:after{
  content:"";
  position:absolute;
  border-radius:999px;
  background:rgba(255,255,255,.10);
}
.hero:before{width:180px;height:180px;right:-24px;top:-24px}
.hero:after{width:120px;height:120px;left:-18px;bottom:-24px}
h1{margin:0 0 6px 0;font-size:34px;position:relative;z-index:1}
.hero-sub{font-size:14px;opacity:.95;position:relative;z-index:1;max-width:820px;line-height:1.45}
.hero-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;z-index:1}
.hero-chip{background:rgba(255,255,255,.16);padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700}
.small{font-size:13px;color:var(--muted)}
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
button,select,input,textarea{
  width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(148,163,184,.25);font:inherit
}
button{font-weight:800;cursor:pointer}
.primary{background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff;border:none}
.secondary{background:#fff}
input,select,textarea{background:rgba(255,255,255,.96);color:var(--text)}
textarea{min-height:92px;resize:vertical}
.metric{background:rgba(255,255,255,.72);padding:14px;border-radius:18px;border:1px solid rgba(148,163,184,.14)}
.metric-label{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;margin-bottom:6px}
.metric-value{font-size:28px;font-weight:900;line-height:1.05}
.metric-sub{font-size:13px;color:var(--muted);margin-top:4px}
.kid-card{background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(239,246,255,.95));padding:14px;border-radius:18px;border:1px solid rgba(148,163,184,.15)}
.kid-name{font-size:20px;font-weight:900}
.kid-age{font-size:12px;color:var(--muted);text-transform:uppercase;font-weight:800;letter-spacing:.05em;margin-bottom:4px}
.kid-note{font-size:13px;color:var(--muted);line-height:1.4;margin-top:6px}
.bar-shell{height:14px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:10px}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#7c3aed,#db2777);transition:width .2s ease}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;margin:4px 6px 0
